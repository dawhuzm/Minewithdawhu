<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin:0; padding:0; background: #0a001f; color:#fff; font-family:sans-serif; 
            text-align:center; min-height:100vh;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px; gap: 8px; background: rgba(0,0,0,0.9);
        }
        .top-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 10px 12px; border-radius: 18px;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            flex: 1; text-align: center;
        }
        .profile-card {
            display: flex; align-items: center; gap: 10px;
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            padding: 8px 12px; border-radius: 18px;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
        }
        .mine-area {
            margin: 30px 15px; padding: 30px 15px; background: rgba(20,0,50,0.95);
            border: 3px solid #00ffff; border-radius: 20px;
        }
        .claim-btn {
            width: 88%; padding: 22px; font-size: 2em; font-weight: bold;
            background: linear-gradient(#00ff88, #00aa44); color: black;
            border: none; border-radius: 16px; margin: 25px auto; cursor: pointer;
            box-shadow: 0 0 30px #0f0;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around; 
            background: rgba(10,0,30,0.98); padding: 12px 8px; gap: 8px;
        }
        .nav-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 12px 8px; border-radius: 18px;
            flex: 1; text-align: center; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            cursor: pointer;
        }
        .nav-card:active {
            transform: scale(0.95);
            box-shadow: 0 0 25px rgba(255, 136, 0, 0.9);
        }
        .icon { font-size: 1.8em; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <!-- Profile (Telegram Name + Picture) -->
        <div class="profile-card">
            <div style="width:48px;height:48px;background:linear-gradient(#ff00ff,#00ffff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid #fff;">👤</div>
            <div><strong id="username">Player</strong></div>
        </div>

        <!-- Balance -->
        <div class="top-card">
            <strong id="balance">0.00</strong> $Dhu
        </div>

        <!-- Wallet -->
        <div class="top-card">
            🔗 wallet
        </div>
    </div>

    <!-- Mining Area -->
    <div class="mine-area">
        <h2>⛏️ MINING MECHANISM</h2>
        <p style="font-size:1.6em; color:#00ffff; margin:15px 0;">5 Hour Duration</p>
        <div style="margin:25px 0; font-size:90px;">⛏️</div>
        <p id="status" style="color:#00ff41; font-size:1.2em;">Mining in progress...</p>
    </div>

    <!-- Claim Button -->
    <button class="claim-btn" onclick="claimReward()">CLAIM</button>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-card" onclick="showSection('home')">
            <span class="icon">🏠</span>
            HOME
        </div>
        <div class="nav-card" onclick="showSection('tasks')">
            <span class="icon">🧰</span>
            TASKS
        </div>
        <div class="nav-card" onclick="showSection('invite')">
            <span class="icon">🫂</span>
            INVITE
        </div>
        <div class="nav-card" onclick="showSection('profile')">
            <span class="icon">🪪</span>
            PROFILE
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('dawBalance') || 0);

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(4);
            document.getElementById('username').textContent = tg.initDataUnsafe?.user?.first_name || "Player";
        }

        function claimReward() {
            const reward = 0.85 + (Math.random() * 0.45);
            balance += reward;
            localStorage.setItem('dawBalance', balance);
            updateUI();
            tg.showPopup({message: `✅ +${reward.toFixed(2)} DHU Claimed!`});
        }

        function showSection(section) {
            tg.showPopup({message: `${section.toUpperCase()} section coming soon!`});
        }

        // Passive mining
        setInterval(() => {
            balance += 0.005;
            updateUI();
            localStorage.setItem('dawBalance', balance);
        }, 2500);

        updateUI();
    </script>
</body>
</html>
