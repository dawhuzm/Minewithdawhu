<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #1a0033, #2d004d);
            color: white;
            min-height: 100vh;
            padding-bottom: 85px;
        }
        .top-bar {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.4);
        }
        .player {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            padding: 8px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }
        .player-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }
        .balance {
            background: linear-gradient(135deg, #f97316, #eab308);
            color: black;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
        }
        .wallet {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main {
            text-align: center;
            padding: 20px 20px 10px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #e0e7ff;
        }

        .progress-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 20px auto;
        }
        .progress-circle { transform: rotate(-90deg); }
        .progress-bg {
            fill: none;
            stroke: #1e3a8a;
            stroke-width: 18;
        }
        .progress-ring {
            fill: none;
            stroke: #22d3ee;
            stroke-width: 18;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.05s linear;
        }
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 190px;
            height: 190px;
            background: radial-gradient(circle, #3b82f6, #1e40af);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            box-shadow: 0 0 50px #22d3ee;
            border: 8px solid #10b981;
            pointer-events: none;
        }

        .mined {
            font-size: 18px;
            margin: 15px 0 25px;
            color: #a5b4fc;
        }

        .action-btn {
            background: linear-gradient(90deg, #10b981, #34d399);
            color: black;
            font-size: 18px;
            font-weight: bold;
            padding: 16px 40px;
            border-radius: 50px;
            border: none;
            width: 90%;
            max-width: 320px;
            margin: 10px auto 30px;
            box-shadow: 0 0 25px #34d399;
            cursor: pointer;
        }
        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            padding: 8px 10px 10px;
            gap: 8px;
        }
        .nav-item {
            flex: 1;
            background: rgba(139, 92, 246, 0.15);
            border: 2px solid #6b21a8;
            border-radius: 16px;
            padding: 10px 6px 6px;
            text-align: center;
            color: #c4d0ff;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .nav-item.active {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: white;
            border-color: #facc15;
            transform: scale(1.05);
        }
        .nav-icon {
            font-size: 26px;
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div id="player-info" class="player">
            👤 <span id="player-name">Player</span>
        </div>
        <div id="balance" class="balance">52.79 Dhu</div>
        <div class="wallet">💼 Wallet</div>
    </div>

    <div class="main">
        <div class="title">Mining $Dawhu ⛏️</div>
        
        <div class="progress-container">
            <svg class="progress-circle" width="260" height="260" viewBox="0 0 260 260">
                <circle class="progress-bg" cx="130" cy="130" r="106"/>
                <circle id="progress-ring" class="progress-ring" cx="130" cy="130" r="106"
                    stroke-dasharray="665" stroke-dashoffset="665"/>
            </svg>
            <div class="center-circle">$DHU</div>
        </div>
        
        <div class="mined">Mined: <span id="mined-amount">0.20</span> $DHU</div>
        
        <button id="action-btn" class="action-btn">TAP TO START MINING</button>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab(0)">
            <span class="nav-icon">🏠</span>
            HOME
        </div>
        <div class="nav-item" onclick="switchTab(1)">
            <span class="nav-icon">📋</span>
            TASKS
        </div>
        <div class="nav-item" onclick="switchTab(2)">
            <span class="nav-icon">👥</span>
            INVITE
        </div>
        <div class="nav-item" onclick="switchTab(3)">
            <span class="nav-icon">👤</span>
            PROFILE
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp || {};
        if (tg.expand) tg.expand();
        if (tg.ready) tg.ready();

        // Load Telegram User Info (First Name + Photo)
        function loadUserInfo() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                // Set first name
                document.getElementById('player-name').textContent = user.first_name || "Player";

                // Add profile photo if available
                const playerDiv = document.getElementById('player-info');
                if (user.photo_url) {
                    const img = document.createElement('img');
                    img.src = user.photo_url;
                    img.className = 'player-img';
                    playerDiv.insertBefore(img, playerDiv.firstChild);
                }
            }
        }

        let balance = 52.79;
        let mined = 0.20;
        let isMining = false;
        let progressInterval = null;

        const progressRing = document.getElementById('progress-ring');
        const actionBtn = document.getElementById('action-btn');

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(2) + " Dhu";
            document.getElementById('mined-amount').textContent = mined.toFixed(2);
        }

        function startMining() {
            if (isMining) return;
            isMining = true;

            actionBtn.textContent = "MINING...";
            actionBtn.disabled = true;

            let progress = 0;
            const duration = 3000;
            const startTime = Date.now();

            progressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                progress = Math.min((elapsed / duration) * 100, 100);

                const offset = 665 * (1 - progress / 100);
                progressRing.setAttribute('stroke-dashoffset', offset);

                if (progress >= 100) {
                    finishMining();
                }
            }, 30);
        }

        function finishMining() {
            clearInterval(progressInterval);
            
            mined += 1.2 + Math.random() * 0.8;
            balance += 0.45;

            actionBtn.textContent = "CLAIM REWARD";
            actionBtn.disabled = false;
            actionBtn.onclick = claimReward;

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            updateUI();
        }

        function claimReward() {
            if (mined > 0) {
                balance += mined;
                mined = 0;

                alert("✅ Reward Claimed Successfully!");
                
                actionBtn.textContent = "TAP TO START MINING";
                actionBtn.onclick = startMining;
                
                progressRing.setAttribute('stroke-dashoffset', 665);
                isMining = false;
                
                updateUI();
            }
        }

        function switchTab(n) {
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', i === n);
            });
            if (n !== 0) {
                alert("This tab is coming soon!");
            }
        }

        actionBtn.onclick = startMining;

        // Passive mining
        setInterval(() => {
            if (!isMining) {
                mined += 0.02;
                updateUI();
            }
        }, 1400);

        // Initialize
        loadUserInfo();
        updateUI();
    </script>
</body>
</html>
