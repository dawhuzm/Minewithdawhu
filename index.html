<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Keep your original beautiful styles here */
        body { margin:0; padding:0; background: #0a001f; color:#fff; font-family:sans-serif; text-align:center; min-height:100vh; overflow: hidden;}
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 8px; gap: 6px; background: rgba(0,0,0,0.95); }
        .top-card, .profile-card { background: linear-gradient(145deg, #2a0055, #4a0088); border: 3px solid #ff8800; color: white; padding: 8px 10px; border-radius: 16px; box-shadow: 0 0 15px rgba(255, 136, 0, 0.6); flex: 1; text-align: center; }
        .profile-card { display: flex; align-items: center; gap: 8px; }
        .mining-area { margin: 15px 15px 80px; background: linear-gradient(145deg, #4a0088, #2a0055, #1a0033); border-radius: 28px; padding: 25px 15px 35px; box-shadow: 0 0 40px rgba(168, 85, 247, 0.8); }
        .status { font-size: 17px; margin: 15px 0 12px; min-height: 56px; line-height: 1.4; white-space: pre-line; }
        .action-btn { background: linear-gradient(#00ff88, #00cc66); color: black; font-weight: bold; font-size: 18px; padding: 15px 40px; border: none; border-radius: 12px; margin: 10px auto; cursor: pointer; box-shadow: 0 0 25px #00ff88; width: 85%; max-width: 300px; }
        .action-btn.mining { background: linear-gradient(#ffaa00, #ff8800); box-shadow: 0 0 20px #ffaa00; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="profile-card">
            <div style="width:42px;height:42px;background:linear-gradient(#ff00ff,#00ffff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid #fff;">👤</div>
            <div><strong id="username">Player</strong></div>
        </div>
        <div class="top-card"><strong id="balance">0.00</strong> Dhu</div>
        <div class="top-card">💼 Wallet</div>
    </div>

    <div class="mining-area">
        <h2>Mining $Dawhu ⛏️</h2>
        <div class="progress-container">
            <svg width="200" height="200">
                <circle cx="100" cy="100" r="89" fill="none" stroke="#0a0022" stroke-width="18"/>
                <circle id="progressCircle" cx="100" cy="100" r="89" fill="none" stroke="#00ff88" stroke-width="18" stroke-dasharray="560" stroke-dashoffset="560" stroke-linecap="round"/>
            </svg>
            <div class="center-coin">$DHU</div>
        </div>
        <div class="status" id="status">Loading mining status...</div>
        <button id="actionBtn" class="action-btn">START MINING</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let userId = null;
        let balance = 0;
        let miningStartTime = null;
        let countdownInterval = null;

        // === CHANGE THIS TO YOUR NEW BACKEND URL ===
        const API_BASE = "https://your-new-backend.up.railway.app/api";

        const TOTAL_MINING_TIME = 5 * 60 * 60 * 1000;
        const TOTAL_REWARD = 1000;
        const circumference = 560;

        const statusEl = document.getElementById('status');
        const actionBtn = document.getElementById('actionBtn');
        const progressCircle = document.getElementById('progressCircle');
        const balanceEl = document.getElementById('balance');

        async function api(endpoint, method = "GET", body = null) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method,
                    headers: {"Content-Type": "application/json"},
                    body: body ? JSON.stringify(body) : null
                });
                return await res.json();
            } catch(e) {
                statusEl.textContent = "❌ Server not connected";
                return {success: false};
            }
        }

        function updateUI() { balanceEl.textContent = balance.toFixed(2); }
        function updateProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            progressCircle.style.strokeDashoffset = offset;
        }
        function formatTimeLeft(ms) {
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        async function loadData() {
            if (!userId) return;
            const data = await api(`/load?user_id=${userId}`);
            if (data.success) {
                balance = parseFloat(data.balance) || 0;
                miningStartTime = data.mining_start_time ? new Date(data.mining_start_time) : null;
                updateUI();
                checkMiningProgress();
            }
        }

        function checkMiningProgress() {
            if (countdownInterval) clearInterval(countdownInterval);

            if (!miningStartTime) {
                statusEl.textContent = "Tap to start 5-hour mining";
                actionBtn.textContent = "START MINING";
                actionBtn.classList.remove('mining');
                updateProgress(0);
                return;
            }

            const elapsed = Date.now() - miningStartTime.getTime();
            const remaining = TOTAL_MINING_TIME - elapsed;

            if (remaining <= 0) {
                statusEl.textContent = `✅ Mining Complete!\nYou earned ${TOTAL_REWARD} $DHU`;
                actionBtn.textContent = `CLAIM ${TOTAL_REWARD} $DHU`;
                actionBtn.classList.remove('mining');
                updateProgress(100);
            } else {
                actionBtn.textContent = "MINING IN PROGRESS...";
                actionBtn.classList.add('mining');
                updateProgress((elapsed / TOTAL_MINING_TIME) * 100);

                countdownInterval = setInterval(() => {
                    const newRemaining = TOTAL_MINING_TIME - (Date.now() - miningStartTime.getTime());
                    if (newRemaining > 0) {
                        statusEl.textContent = `Mining in progress...\n${formatTimeLeft(newRemaining)} left`;
                    } else {
                        checkMiningProgress();
                    }
                }, 1000);
            }
        }

        async function startMining() {
            if (miningStartTime) return;
            miningStartTime = new Date();
            const res = await api('/start-mining', 'POST', { user_id: userId, start_time: miningStartTime.toISOString() });
            if (res.success) checkMiningProgress();
        }

        async function claimReward() {
            const res = await api('/claim', 'POST', { user_id: userId });
            if (res.success) {
                balance += TOTAL_REWARD;
                updateUI();
                miningStartTime = null;
                checkMiningProgress();
            }
        }

        actionBtn.addEventListener('click', () => {
            if (actionBtn.textContent.includes("CLAIM")) claimReward();
            else startMining();
        });

        window.onload = () => {
            if (tg.initDataUnsafe?.user) {
                userId = tg.initDataUnsafe.user.id;
                document.getElementById('username').textContent = tg.initDataUnsafe.user.first_name || "Player";
                loadData();
            }
        };
    </script>
</body>
</html>
