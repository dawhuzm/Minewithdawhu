<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin:0; padding:0; background: #0a001f; color:#fff; font-family:sans-serif; 
            text-align:center; min-height:100vh;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px; gap: 8px; background: rgba(0,0,0,0.9);
        }
        .top-card, .profile-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 10px 12px; border-radius: 18px;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            flex: 1; text-align: center;
        }
        .profile-card {
            display: flex; align-items: center; gap: 10px;
        }
        .mining-area {
            margin: 70px 20px 100px;
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 4px solid #ff8800;
            border-radius: 24px;
            padding: 20px 15px;
            box-shadow: 0 0 30px rgba(255, 136, 0, 0.7),
                        inset 0 0 40px rgba(138, 43, 226, 0.5);
            position: relative;
            overflow: hidden;
        }
        .mining-area h2 {
            color: #00ffff;
            text-shadow: 0 0 15px #00ffff;
            margin-bottom: 15px;
        }
        .penguin {
            font-size: 110px;
            margin: 10px 0;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 0 15px #ffd700);
        }
        .coin {
            position: absolute;
            font-size: 32px;
            color: #ffd700;
            text-shadow: 0 0 12px gold;
            animation: floatCoin 4s linear infinite;
            user-select: none;
        }
        @keyframes floatCoin {
            0% { transform: translateY(100px) scale(0.6); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-280px) scale(1.1); opacity: 0; }
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around; 
            background: rgba(10,0,30,0.98); padding: 12px 8px; gap: 8px;
        }
        .nav-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 12px 8px; border-radius: 18px;
            flex: 1; text-align: center; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            cursor: pointer;
        }
        .nav-card:active {
            transform: scale(0.95);
            box-shadow: 0 0 25px rgba(255, 136, 0, 0.9);
        }
        .icon { font-size: 1.8em; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="profile-card">
            <div style="width:48px;height:48px;background:linear-gradient(#ff00ff,#00ffff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid #fff;">👤</div>
            <div><strong id="username">Player</strong></div>
        </div>

        <div class="top-card" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
            <strong id="balance">0.00</strong> Dhu
        </div>

        <div class="top-card">
            💼 Wallet
        </div>
    </div>

    <!-- Mining Area -->
    <div class="mining-area" id="miningArea">
        <h2>🪙 Active Self Miner 🪙</h2>
        <div class="penguin">🐧</div>
        <p style="color:#ffd700; font-size:18px; margin:10px 0;">Mining DHU Coins...</p>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-card" onclick="showSection('home')">
            <span class="icon">🏠</span>
            HOME
        </div>
        <div class="nav-card" onclick="showSection('tasks')">
            <span class="icon">🧰</span>
            TASKS
        </div>
        <div class="nav-card" onclick="showSection('invite')">
            <span class="icon">🫂</span>
            INVITE
        </div>
        <div class="nav-card" onclick="showSection('profile')">
            <span class="icon">🪪</span>
            PROFILE
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('dawBalance') || 12.45);

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(2);
            document.getElementById('username').textContent = tg.initDataUnsafe?.user?.first_name || "Player";
        }

        function showSection(section) {
            tg.showPopup({message: `${section.toUpperCase()} section coming soon! 🔥`});
        }

        // Floating coins animation
        function createFloatingCoin() {
            const area = document.getElementById('miningArea');
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.textContent = '🪙';
            
            const left = Math.random() * 70 + 15;
            coin.style.left = left + '%';
            coin.style.bottom = '60px';
            coin.style.animationDuration = (3 + Math.random() * 3) + 's';
            
            area.appendChild(coin);
            
            setTimeout(() => coin.remove(), 6000);
        }

        // Auto floating coins
        setInterval(() => {
            if (Math.random() > 0.3) createFloatingCoin();
        }, 400);

        // Passive mining
        setInterval(() => {
            balance += 0.015;
            updateUI();
            localStorage.setItem('dawBalance', balance);
        }, 6000);

        updateUI();
    </script>
</body>
</html>
