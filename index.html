<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin:0; padding:0; background: #0a001f; color:#fff; font-family:sans-serif; 
            text-align:center; min-height:100vh;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px; gap: 8px; background: rgba(0,0,0,0.9);
        }
        .top-card, .profile-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 10px 12px; border-radius: 18px;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            flex: 1; text-align: center;
        }
        .profile-card {
            display: flex; align-items: center; gap: 10px;
        }

        /* Purple Sparkle Mining Area */
        .mining-area {
            margin: 70px 20px 100px;
            background: linear-gradient(145deg, #4a0088, #2a0055, #1a0033);
            border-radius: 28px;
            padding: 25px 15px 30px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.8),
                        0 0 70px rgba(236, 72, 153, 0.4),
                        inset 0 0 60px rgba(168, 85, 247, 0.5);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.6);
        }

        .mining-area::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.18) 0%, transparent 70%);
            animation: pulse 8s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .mining-area h2 {
            color: #ffd700;
            font-size: 24px;
            text-shadow: 0 0 20px #ffd700, 0 0 30px #a855f7;
            margin-bottom: 15px;
            z-index: 3;
            position: relative;
        }

        .miner-scene {
            position: relative;
            height: 190px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }

        .fan {
            font-size: 130px;
            animation: spinFan 0.8s linear infinite;
            filter: drop-shadow(0 0 25px #00ffff);
            z-index: 2;
        }

        @keyframes spinFan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fan-base {
            position: absolute;
            font-size: 45px;
            bottom: 35px;
            color: #aaa;
            z-index: 1;
        }

        .coin {
            position: absolute;
            font-size: 36px;
            color: #ffd700;
            text-shadow: 0 0 15px gold, 0 0 30px #fff;
            animation: floatCoin 4.2s linear infinite;
            user-select: none;
            z-index: 1;
        }

        @keyframes floatCoin {
            0% { transform: translateY(130px) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-340px) scale(1.25) rotate(420deg); opacity: 0; }
        }
