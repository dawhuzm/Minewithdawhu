<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin:0; padding:0; background: #0a001f; color:#0ff; font-family:sans-serif; 
            text-align:center; min-height:100vh;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; gap: 8px; background: rgba(0,0,0,0.8);
        }
        .blue-box {
            background: #1a00ff; color: white; padding: 8px 12px;
            border-radius: 10px; border: 2px solid #00ffff;
            font-size: 0.95em; min-width: 110px;
        }
        .profile-box {
            display: flex; align-items: center; gap: 8px;
            background: #1a00ff; color: white; padding: 8px 12px;
            border-radius: 10px; border: 2px solid #00ffff;
        }
        .mine-area {
            margin: 25px 15px; padding: 25px 15px; background: rgba(20,0,50,0.9);
            border: 3px solid #00ffff; border-radius: 16px;
        }
        .claim-btn {
            width: 88%; padding: 20px; font-size: 1.9em; font-weight: bold;
            background: linear-gradient(#00ff41, #008800); color: black;
            border: none; border-radius: 12px; margin: 20px auto; cursor: pointer;
            box-shadow: 0 0 25px #0f0;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; background: rgba(0,0,0,0.95); border-top: 3px solid #00ffff;
        }
        .nav-item {
            flex: 1; padding: 16px 5px; color: #0ff; font-size: 1em;
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <!-- Profile -->
        <div class="profile-box">
            <div style="width:45px;height:45px;background:#6600ff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;">👤</div>
            <div>
                <strong id="username">Player</strong>
            </div>
        </div>

        <!-- Balance -->
        <div class="blue-box">
            Balance: <strong id="balance">0.0000</strong> DHU
        </div>

        <!-- Wallet -->
        <div class="blue-box" style="text-align:center;">
            💼 Wallet
        </div>
    </div>

    <!-- Mining Area -->
    <div class="mine-area">
        <h2>⛏️ MINING MECHANISM</h2>
        <p style="font-size:1.5em; color:#00ffff; margin:15px 0;">5 Hour Duration</p>
        <div style="margin:20px 0; font-size:80px;">⛏️</div>
        <p id="status" style="color:#00ff41; font-size:1.1em;">Mining in progress...</p>
    </div>

    <!-- Claim Button -->
    <button class="claim-btn" onclick="claimReward()">CLAIM</button>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="showSection('invite')">Invite</div>
        <div class="nav-item" onclick="showSection('tasks')">Tasks</div>
        <div class="nav-item" onclick="showSection('profile')">Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('dawBalance') || 0);

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(4);
            document.getElementById('username').textContent = tg.initDataUnsafe?.user?.first_name || "Player";
        }

        function claimReward() {
            const reward = 0.8 + (Math.random() * 0.4);
            balance += reward;
            localStorage.setItem('dawBalance', balance);
            updateUI();
            tg.showPopup({message: `✅ +${reward.toFixed(2)} DHU Claimed!`});
        }

        function showSection(section) {
            tg.showPopup({message: `${section} feature coming soon!`});
        }

        // Passive mining
        setInterval(() => {
            balance += 0.004;
            updateUI();
            localStorage.setItem('dawBalance', balance);
        }, 2500);

        updateUI();
    </script>
</body>
</html>
