<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin:0; padding:0; background: #0a001f; color:#fff; font-family:sans-serif; 
            text-align:center; min-height:100vh; overflow: hidden;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 8px; gap: 6px; background: rgba(0,0,0,0.95);
        }
        .top-card, .profile-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 8px 10px; border-radius: 16px;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            flex: 1; text-align: center;
        }
        .profile-card {
            display: flex; align-items: center; gap: 8px;
        }

        .mining-area {
            margin: 15px 15px 80px;
            background: linear-gradient(145deg, #4a0088, #2a0055, #1a0033);
            border-radius: 28px;
            padding: 25px 15px 35px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.8),
                        0 0 70px rgba(236, 72, 153, 0.4),
                        inset 0 0 60px rgba(168, 85, 247, 0.5);
        }

        .progress-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 15px auto;
        }

        .center-coin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: linear-gradient(145deg, #2a7cff, #1a5be0, #0f3da8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: bold;
            color: white;
            box-shadow: 
                0 0 35px #00ff88,
                0 0 60px #00ff88,
                inset 0 0 30px rgba(255,255,255,0.5),
                0 8px 25px rgba(0,0,0,0.7);
            border: 12px solid #0a0022;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255,255,255,0.95);
        }

        .status {
            font-size: 17px;
            margin: 15px 0 12px;
            min-height: 26px;
        }

        .action-btn {
            background: linear-gradient(#00ff88, #00cc66);
            color: black;
            font-weight: bold;
            font-size: 18px;
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            margin: 10px auto;
            cursor: pointer;
            box-shadow: 0 0 25px #00ff88;
            width: 85%;
            max-width: 300px;
        }

        .action-btn.mining {
            background: linear-gradient(#ffaa00, #ff8800);
            box-shadow: 0 0 20px #ffaa00;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around; 
            background: rgba(10,0,30,0.98); padding: 10px 6px; gap: 6px;
        }
        .nav-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 10px 6px; border-radius: 16px;
            flex: 1; text-align: center; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="profile-card">
            <div style="width:42px;height:42px;background:linear-gradient(#ff00ff,#00ffff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid #fff;">👤</div>
            <div><strong id="username">Player</strong></div>
        </div>

        <div class="top-card">
            <strong id="balance">0.00</strong> Dhu
        </div>

        <div class="top-card">💼 Wallet</div>
    </div>

    <!-- Mining Area -->
    <div class="mining-area" id="miningArea">
        <h2>Mining $Dawhu ⛏️</h2>
        
        <div class="progress-container">
            <svg class="progress-ring" width="200" height="200">
                <circle class="progress-ring__bg" cx="100" cy="100" r="89" fill="none" stroke="#0a0022" stroke-width="18"/>
                <circle id="progressCircle" class="progress-ring__circle" cx="100" cy="100" r="89" 
                        fill="none" stroke="#00ff88" stroke-width="18"
                        stroke-dasharray="560" stroke-dashoffset="560" stroke-linecap="round"/>
            </svg>
            <div class="center-coin" id="centerCoin">$DHU</div>
        </div>

        <div class="status" id="status">Tap button to start mining</div>
        
        <button id="actionBtn" class="action-btn">START MINING</button>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-card" onclick="showSection('home')">🏠 HOME</div>
        <div class="nav-card" onclick="showSection('tasks')">🧰 TASKS</div>
        <div class="nav-card" onclick="showSection('invite')">🫂 INVITE</div>
        <div class="nav-card" onclick="showSection('profile')">🪪 PROFILE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('dawBalance') || '12.45');
        let isMining = false;
        let minedAmount = 0;
        let miningInterval = null;

        const statusEl = document.getElementById('status');
        const actionBtn = document.getElementById('actionBtn');
        const progressCircle = document.getElementById('progressCircle');
        const balanceEl = document.getElementById('balance');

        const TOTAL_MINING_TIME = 5000;
        const TOTAL_REWARD = 2.25;
        const circumference = 560;

        function updateUI() {
            balanceEl.textContent = balance.toFixed(2);
        }

        function updateProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            progressCircle.style.strokeDashoffset = offset;
        }

        function showSection(section) {
            tg.showPopup({message: `${section.toUpperCase()} section coming soon! 🔥`});
        }

        function startMining() {
            if (isMining) return;
            
            isMining = true;
            minedAmount = 0;
            const startTime = Date.now();

            updateProgress(0);
            statusEl.textContent = "Mining in progress...";
            actionBtn.textContent = "MINING IN PROGRESS...";
            actionBtn.classList.add('mining');

            miningInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                let progress = Math.min((elapsed / TOTAL_MINING_TIME) * 100, 100);
                updateProgress(progress);

                if (progress >= 100) finishMining();
            }, 50);
        }

        function finishMining() {
            clearInterval(miningInterval);
            isMining = false;
            minedAmount = TOTAL_REWARD;

            statusEl.textContent = `Mined: ${minedAmount.toFixed(2)} $DHU`;
            actionBtn.textContent = "CLAIM REWARD";
            actionBtn.classList.remove('mining');
        }

        function claimReward() {
            if (minedAmount <= 0) return;

            balance += minedAmount;
            updateUI();
            localStorage.setItem('dawBalance', balance);

            minedAmount = 0;
            updateProgress(0);
            statusEl.textContent = "Tap button to start mining";
            actionBtn.textContent = "START MINING";
            actionBtn.classList.remove('mining');
        }

        actionBtn.addEventListener('click', () => {
            if (!isMining && actionBtn.textContent === "START MINING") {
                startMining();
            } else if (actionBtn.textContent === "CLAIM REWARD") {
                claimReward();
            }
        });

        // Initialize
        updateUI();
    </script>
</body>
</html>
