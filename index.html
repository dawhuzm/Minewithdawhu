<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin:0; padding:0; background: #0a001f; color:#fff; font-family:sans-serif; 
            text-align:center; min-height:100vh;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px; gap: 8px; background: rgba(0,0,0,0.9);
        }
        .top-card, .profile-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 10px 12px; border-radius: 18px;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            flex: 1; text-align: center;
        }
        .profile-card {
            display: flex; align-items: center; gap: 10px;
        }

        .mining-area {
            margin: 60px 20px 100px;
            background: linear-gradient(145deg, #4a0088, #2a0055, #1a0033);
            border-radius: 28px;
            padding: 25px 15px 35px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.8),
                        0 0 70px rgba(236, 72, 153, 0.4),
                        inset 0 0 60px rgba(168, 85, 247, 0.5);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.6);
        }

        .mining-area::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.2) 0%, transparent 70%);
            animation: pulse 8s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .mining-area h2 {
            color: #ffd700;
            font-size: 24px;
            text-shadow: 0 0 20px #ffd700, 0 0 30px #a855f7;
            margin-bottom: 15px;
            z-index: 3;
            position: relative;
        }

        .tap-coin {
            font-size: 160px;
            cursor: pointer;
            transition: transform 0.1s;
            filter: drop-shadow(0 0 30px #ffd700);
            user-select: none;
        }
        .tap-coin:active { transform: scale(0.85); }

        .status {
            font-size: 18px;
            margin: 15px 0;
            min-height: 28px;
        }

        .claim-btn {
            background: linear-gradient(#00ff00, #00cc00);
            color: black;
            font-weight: bold;
            font-size: 20px;
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 0 20px #00ff00;
            display: none;
        }

        .coin {
            position: absolute;
            font-size: 38px;
            color: #ffd700;
            text-shadow: 0 0 20px gold;
            animation: floatCoin 3.5s linear forwards;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes floatCoin {
            0% { transform: translateY(100px) scale(0.6); opacity: 1; }
            100% { transform: translateY(-280px) scale(1.3) rotate(360deg); opacity: 0; }
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around; 
            background: rgba(10,0,30,0.98); padding: 12px 8px; gap: 8px;
        }
        .nav-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 12px 8px; border-radius: 18px;
            flex: 1; text-align: center; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="profile-card">
            <div style="width:48px;height:48px;background:linear-gradient(#ff00ff,#00ffff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid #fff;">👤</div>
            <div><strong id="username">Player</strong></div>
        </div>

        <div class="top-card">
            <strong id="balance">0.00</strong> Dhu
        </div>

        <div class="top-card">💼 Wallet</div>
    </div>

    <!-- Mining Area -->
    <div class="mining-area" id="miningArea">
        <h2>🪙 Active Self Miner 🪙</h2>
        
        <div style="margin: 20px 0;">
            <div id="mainCoin" class="tap-coin">🪙</div>
        </div>

        <div class="status" id="status">Tap the coin to start mining</div>
        
        <button id="claimBtn" class="claim-btn">CLAIM REWARDS</button>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-card" onclick="showSection('home')"><span class="icon">🏠</span>HOME</div>
        <div class="nav-card" onclick="showSection('tasks')"><span class="icon">🧰</span>TASKS</div>
        <div class="nav-card" onclick="showSection('invite')"><span class="icon">🫂</span>INVITE</div>
        <div class="nav-card" onclick="showSection('profile')"><span class="icon">🪪</span>PROFILE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('dawBalance') || 12.45);
        let isMining = false;
        let minedAmount = 0;
        let miningInterval = null;
        let timerInterval = null;

        const mainCoin = document.getElementById('mainCoin');
        const statusEl = document.getElementById('status');
        const claimBtn = document.getElementById('claimBtn');

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(2);
        }

        function showSection(section) {
            tg.showPopup({message: `${section.toUpperCase()} section coming soon! 🔥`});
        }

        // Create floating coin effect
        function createFloatingCoin() {
            const area = document.getElementById('miningArea');
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.textContent = '🪙';
            coin.style.left = (Math.random() * 70 + 15) + '%';
            coin.style.bottom = '100px';
            area.appendChild(coin);
            setTimeout(() => coin.remove(), 4000);
        }

        // Start Mining Session (5 hours in real, 30 seconds for demo)
        function startMining() {
            if (isMining) return;
            
            isMining = true;
            minedAmount = 0;
            claimBtn.style.display = 'none';
            
            statusEl.textContent = "Mining in progress... ⛏️";
            mainCoin.style.pointerEvents = "none";
            mainCoin.style.opacity = "0.7";

            // Mining rate: 0.5 DHU per second (demo) → change to lower for real 5 hours
            miningInterval = setInterval(() => {
                minedAmount += 0.5;   // Increase this for slower mining
                createFloatingCoin();
            }, 800);

            // Demo: 30 seconds (Change to 5*60*60*1000 for real 5 hours)
            setTimeout(() => {
                if (isMining) finishMining();
            }, 30000); // ← Change to 18000000 (5 hours) for production
        }

        function finishMining() {
            clearInterval(miningInterval);
            isMining = false;
            mainCoin.style.pointerEvents = "auto";
            mainCoin.style.opacity = "1";
            
            statusEl.textContent = `Mined: ${minedAmount.toFixed(2)} $DHU`;
            claimBtn.style.display = 'block';
        }

        // Claim Rewards
        claimBtn.addEventListener('click', () => {
            balance += minedAmount;
            updateUI();
            localStorage.setItem('dawBalance', balance);

            // Reset for next session
            minedAmount = 0;
            claimBtn.style.display = 'none';
            statusEl.textContent = "Tap the coin to start mining";
        });

        // Tap Coin
        mainCoin.addEventListener('click', () => {
            if (!isMining) {
                startMining();
            } else {
                createFloatingCoin(); // Extra visual feedback while mining
            }
        });

        // Initial UI update
        updateUI();
    </script>
</body>
</html>
