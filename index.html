<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin:0; padding:0; background: #0a001f; color:#fff; font-family:sans-serif; 
            text-align:center; min-height:100vh;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px; gap: 8px; background: rgba(0,0,0,0.9);
        }
        .top-card, .profile-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 10px 12px; border-radius: 18px;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            flex: 1; text-align: center;
        }
        .profile-card {
            display: flex; align-items: center; gap: 10px;
        }

        /* Purple Glow Area */
        .mining-area {
            margin: 70px 20px 100px;
            background: linear-gradient(145deg, #4a0088, #2a0055, #1a0033);
            border-radius: 28px;
            padding: 25px 15px 35px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.8),
                        0 0 70px rgba(236, 72, 153, 0.4),
                        inset 0 0 60px rgba(168, 85, 247, 0.5);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.6);
        }

        .mining-area::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.2) 0%, transparent 70%);
            animation: pulse 8s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .mining-area h2 {
            color: #ffd700;
            font-size: 24px;
            text-shadow: 0 0 20px #ffd700, 0 0 30px #a855f7;
            margin-bottom: 15px;
            z-index: 3;
            position: relative;
        }

        .tap-coin {
            font-size: 160px;
            cursor: pointer;
            transition: transform 0.1s;
            filter: drop-shadow(0 0 30px #ffd700);
            user-select: none;
        }

        .tap-coin:active {
            transform: scale(0.85);
        }

        .coin {
            position: absolute;
            font-size: 38px;
            color: #ffd700;
            text-shadow: 0 0 20px gold, 0 0 35px #fff;
            animation: floatCoin 3.8s linear forwards;
            user-select: none;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes floatCoin {
            0% { transform: translateY(80px) scale(0.6) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-280px) scale(1.3) rotate(360deg); opacity: 0; }
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around; 
            background: rgba(10,0,30,0.98); padding: 12px 8px; gap: 8px;
        }
        .nav-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 12px 8px; border-radius: 18px;
            flex: 1; text-align: center; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            cursor: pointer;
        }
        .nav-card:active {
            transform: scale(0.95);
            box-shadow: 0 0 25px rgba(255, 136, 0, 0.9);
        }
        .icon { font-size: 1.8em; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="profile-card">
            <div style="width:48px;height:48px;background:linear-gradient(#ff00ff,#00ffff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid #fff;">👤</div>
            <div><strong id="username">Player</strong></div>
        </div>

        <div class="top-card" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
            <strong id="balance">0.00</strong> Dhu
        </div>

        <div class="top-card">
            💼 Wallet
        </div>
    </div>

    <!-- Tap to Earn Area -->
    <div class="mining-area" id="miningArea">
        <h2>🪙 Active Self Miner 🪙</h2>
        
        <div style="margin: 20px 0;">
            <div id="mainCoin" class="tap-coin">🪙</div>
        </div>

        <p style="color:#ffd700; font-size:19px; margin:10px 0; text-shadow: 0 0 10px #a855f7;">
            Tap the coin to earn $DHU
        </p>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-card" onclick="showSection('home')">
            <span class="icon">🏠</span>
            HOME
        </div>
        <div class="nav-card" onclick="showSection('tasks')">
            <span class="icon">🧰</span>
            TASKS
        </div>
        <div class="nav-card" onclick="showSection('invite')">
            <span class="icon">🫂</span>
            INVITE
        </div>
        <div class="nav-card" onclick="showSection('profile')">
            <span class="icon">🪪</span>
            PROFILE
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('dawBalance') || 12.45);

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(2);
            document.getElementById('username').textContent = tg.initDataUnsafe?.user?.first_name || "Player";
        }

        function showSection(section) {
            tg.showPopup({message: `${section.toUpperCase()} section coming soon! 🔥`});
        }

        // Tap to Earn
        const mainCoin = document.getElementById('mainCoin');
        mainCoin.addEventListener('click', (e) => {
            // Add balance
            balance += 0.25;
            updateUI();
            localStorage.setItem('dawBalance', balance);

            // Create burst of coins
            for (let i = 0; i < 8; i++) {
                setTimeout(() => createFloatingCoin(e), i * 30);
            }
        });

        function createFloatingCoin(clickEvent) {
            const area = document.getElementById('miningArea');
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.textContent = '🪙';
            
            const rect = area.getBoundingClientRect();
            const x = Math.random() * 160 + 60;
            
            coin.style.left = x + 'px';
            coin.style.bottom = '120px';
            coin.style.animationDuration = (2.8 + Math.random() * 1.5) + 's';
            
            area.appendChild(coin);
            
            setTimeout(() => coin.remove(), 5000);
        }

        // Passive small income
        setInterval(() => {
            balance += 0.008;
            updateUI();
            localStorage.setItem('dawBalance', balance);
        }, 7000);

        updateUI();
    </script>
</body>
</html>
