<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin:0; padding:0; background: #0a001f; color:#fff; font-family:sans-serif; 
            text-align:center; min-height:100vh;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px; gap: 8px; background: rgba(0,0,0,0.9);
        }
        .top-card, .profile-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 10px 12px; border-radius: 18px;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            flex: 1; text-align: center;
        }
        .profile-card {
            display: flex; align-items: center; gap: 10px;
        }

        .mining-area {
            margin: 60px 20px 100px;
            background: linear-gradient(145deg, #4a0088, #2a0055, #1a0033);
            border-radius: 28px;
            padding: 40px 20px 50px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.8),
                        0 0 70px rgba(236, 72, 153, 0.4),
                        inset 0 0 60px rgba(168, 85, 247, 0.5);
            position: relative;
            overflow: hidden;
        }

        .progress-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 20px auto;
        }

        .progress-ring {
            width: 220px;
            height: 220px;
        }

        .center-coin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: linear-gradient(145deg, #2a7cff, #1a5be0, #0f3da8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            color: white;
            box-shadow: 
                0 0 30px rgba(59, 140, 255, 0.8),
                inset 0 0 25px rgba(255,255,255,0.4),
                0 8px 20px rgba(0,0,0,0.6);
            border: 12px solid #0a0022;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255,255,255,0.9);
            pointer-events: none;
        }

        .status {
            font-size: 18px;
            margin: 20px 0 15px;
            min-height: 28px;
        }

        .action-btn {
            background: linear-gradient(#00ff88, #00cc66);
            color: black;
            font-weight: bold;
            font-size: 19px;
            padding: 16px 50px;
            border: none;
            border-radius: 12px;
            margin: 15px auto;
            cursor: pointer;
            box-shadow: 0 0 25px #00ff88;
            width: 85%;
            max-width: 320px;
        }

        .action-btn.mining {
            background: linear-gradient(#ffaa00, #ff8800);
            box-shadow: 0 0 20px #ffaa00;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around; 
            background: rgba(10,0,30,0.98); padding: 12px 8px; gap: 8px;
        }
        .nav-card {
            background: linear-gradient(145deg, #2a0055, #4a0088);
            border: 3px solid #ff8800;
            color: white; padding: 12px 8px; border-radius: 18px;
            flex: 1; text-align: center; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.6);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="profile-card">
            <div style="width:48px;height:48px;background:linear-gradient(#ff00ff,#00ffff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid #fff;">👤</div>
            <div><strong id="username">Player</strong></div>
        </div>

        <div class="top-card">
            <strong id="balance">0.00</strong> Dhu
        </div>

        <div class="top-card">💼 Wallet</div>
    </div>

    <!-- Mining Area -->
    <div class="mining-area" id="miningArea">
        <h2>🪙 Active Self Miner 🪙</h2>
        
        <div class="progress-container">
            <!-- Progress Ring -->
            <svg class="progress-ring" width="220" height="220">
                <circle class="progress-ring__bg" cx="110" cy="110" r="98" fill="none" stroke="#0a0022" stroke-width="20"/>
                <circle id="progressCircle" class="progress-ring__circle" cx="110" cy="110" r="98" 
                        fill="none" stroke="#00aaff" stroke-width="20"
                        stroke-dasharray="615" stroke-dashoffset="615" stroke-linecap="round"/>
            </svg>
            
            <!-- Blue Coin -->
            <div class="center-coin" id="centerCoin">🏛️</div>
        </div>

        <div class="status" id="status">Tap button to start mining</div>
        
        <button id="actionBtn" class="action-btn">START MINING</button>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-card" onclick="showSection('home')"><span class="icon">🏠</span>HOME</div>
        <div class="nav-card" onclick="showSection('tasks')"><span class="icon">🧰</span>TASKS</div>
        <div class="nav-card" onclick="showSection('invite')"><span class="icon">🫂</span>INVITE</div>
        <div class="nav-card" onclick="showSection('profile')"><span class="icon">🪪</span>PROFILE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('dawBalance') || 12.45);
        let isMining = false;
        let minedAmount = 0;
        let miningInterval = null;

        const statusEl = document.getElementById('status');
        const actionBtn = document.getElementById('actionBtn');
        const progressCircle = document.getElementById('progressCircle');

        const circumference = 615;

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(2);
        }

        function updateProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            progressCircle.style.strokeDashoffset = offset;
        }

        function showSection(section) {
            tg.showPopup({message: `${section.toUpperCase()} section coming soon! 🔥`});
        }

        function startMining() {
            if (isMining) return;
            
            isMining = true;
            minedAmount = 0;
            updateProgress(0);

            statusEl.textContent = "Mining in progress...";
            actionBtn.textContent = "MINING IN PROGRESS...";
            actionBtn.classList.add('mining');

            let progress = 0;

            miningInterval = setInterval(() => {
                minedAmount += 0.45;
                progress += 100 / 30;
                updateProgress(Math.min(progress, 100));
            }, 800);

            setTimeout(() => finishMining(), 30000);
        }

        function finishMining() {
            clearInterval(miningInterval);
            isMining = false;

            statusEl.textContent = `Mined: ${minedAmount.toFixed(2)} $DHU`;
            actionBtn.textContent = "CLAIM REWARD";
            actionBtn.classList.remove('mining');
        }

        actionBtn.addEventListener('click', () => {
            if (!isMining) {
                startMining();
            } else if (actionBtn.textContent === "CLAIM REWARD") {
                balance += minedAmount;
                updateUI();
                localStorage.setItem('dawBalance', balance);

                minedAmount = 0;
                updateProgress(0);
                statusEl.textContent = "Tap button to start mining";
                actionBtn.textContent = "START MINING";
                actionBtn.classList.remove('mining');
            }
        });

        updateUI();
    </script>
</body>
</html>
