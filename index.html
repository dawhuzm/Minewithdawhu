<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin:0; padding:0; background: #0a001f; color:#0ff; font-family:sans-serif; 
            text-align:center; min-height:100vh; background-image: url('https://i.imgur.com/5ZfKz3L.png'); 
            background-size: cover;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: rgba(0,0,0,0.7); border-bottom: 2px solid #00ffff;
        }
        .profile { display: flex; align-items: center; gap: 10px; color: white; }
        .balance { color: #ffff00; font-size: 1.3em; }
        .mine-area {
            margin: 30px 15px; padding: 20px; background: rgba(20,0,40,0.85);
            border: 3px solid #00ffff; border-radius: 15px;
        }
        .claim-btn {
            width: 85%; padding: 18px; font-size: 1.8em; font-weight: bold;
            background: linear-gradient(#00ff00, #008800); color: black;
            border: none; border-radius: 12px; margin: 20px auto; cursor: pointer;
            box-shadow: 0 0 20px #0f0;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; background: rgba(0,0,0,0.9); border-top: 2px solid #00ffff;
        }
        .nav-item {
            flex: 1; padding: 15px 5px; color: #0ff; font-size: 0.9em;
        }
        .nav-item:active { background: #220044; }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="profile">
            <div style="width:40px;height:40px;background:#6600ff;border-radius:50%;">👤</div>
            <div><strong id="username">Player</strong></div>
        </div>
        <div class="balance">
            <div>Balance: <span id="balance">0.0000</span> DHU</div>
        </div>
        <div style="color:#ffff00;">💼 Wallet</div>
    </div>

    <!-- Mining Area -->
    <div class="mine-area">
        <h2>⛏️ MINING MECHANISM</h2>
        <p style="font-size:1.4em; margin:15px 0;">5 Hour Duration</p>
        <img src="https://i.imgur.com/2vN8z3k.png" width="180" style="margin:15px 0;" alt="Pickaxe">
        <p id="status" style="color:#0f0;">Mining in progress...</p>
    </div>

    <!-- Claim Button -->
    <button class="claim-btn" onclick="claimReward()">CLAIM</button>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="showSection('invite')">Invite</div>
        <div class="nav-item" onclick="showSection('tasks')">Tasks</div>
        <div class="nav-item" onclick="showSection('profile')">Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseFloat(localStorage.getItem('dawBalance') || 0);
        let miningPower = 25;

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(4);
            document.getElementById('username').textContent = tg.initDataUnsafe?.user?.first_name || "Player";
        }

        function claimReward() {
            const reward = 0.5 + (miningPower * 0.02);
            balance += reward;
            localStorage.setItem('dawBalance', balance);
            updateUI();
            tg.showPopup({message: `✅ Claimed ${reward.toFixed(2)} DHU!`});
        }

        function showSection(section) {
            tg.showPopup({message: section + " section coming soon!"});
        }

        // Passive mining every 3 seconds
        setInterval(() => {
            balance += 0.003;
            updateUI();
            localStorage.setItem('dawBalance', balance);
        }, 3000);

        updateUI();
    </script>
</body>
</html>
