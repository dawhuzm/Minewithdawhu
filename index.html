<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* (Keep all your existing CSS - I'm only showing changes for brevity) */
        .referral-link {
            background: #27272a;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            word-break: break-all;
            margin: 15px 0;
            font-size: 13.5px;
            color: #a5b4fc;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <!-- Top Bar, Home, Task, Settings sections remain the same -->

    <!-- INVITE SECTION -->
    <div id="invite-section" class="invite-section">
        <div class="invite-box">
            <h2>🤑 Invite Friends</h2>
            <p>Invite friends and earn <strong>50 $DHU</strong> per referral!</p>
            
            <div class="referral-link" id="referral-link">
                Loading your referral link...
            </div>
            
            <button class="btn" onclick="copyReferralLink()">📋 Copy Link</button>
            <button class="btn" onclick="shareReferralLink()">🔗 Share on Telegram</button>
            
            <p id="referral-count" style="margin-top: 20px; color: #4ade80; font-weight: bold;">
                Referrals: 0
            </p>
        </div>
    </div>

    <!-- Rest of HTML same as before -->

    <script>
        const tg = window.Telegram.WebApp || {};
        if (tg.expand) tg.expand();
        if (tg.ready) tg.ready();

        let userWallet = localStorage.getItem('userWallet') || '';
        let balance = parseFloat(localStorage.getItem('balance')) || 50.85;
        let mined = parseFloat(localStorage.getItem('mined')) || 2.18;
        let referralCount = parseInt(localStorage.getItem('referralCount')) || 0;
        let isMining = false;
        let miningStartTime = null;
        let progressInterval = null;

        const BOT_TOKEN = "8974021303:AAFl_ic6z50DdpcTvSILVHUDpy7rXmBMoec";

        // ... keep all your other variables and functions (progressRing, actionBtn, etc.)

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(2) + " Dhu";
            document.getElementById('mined-amount').textContent = mined.toFixed(2);
            document.getElementById('referral-count').textContent = `Referrals: ${referralCount}`;
            localStorage.setItem('balance', balance.toFixed(2));
            localStorage.setItem('mined', mined.toFixed(2));
            localStorage.setItem('referralCount', referralCount);
        }

        // ==================== IMPROVED REFERRAL SYSTEM ====================
        function getReferralLink() {
            const user = tg.initDataUnsafe?.user;
            const userId = user?.id || '123456';
            return `https://t.me/DawhuBot?start=ref${userId}`;
        }

        function processReferral() {
            let startParam = tg.initDataUnsafe?.start_param;
            
            // Fallback for some Telegram versions
            if (!startParam) {
                const urlParams = new URLSearchParams(window.location.search);
                startParam = urlParams.get('start_param') || urlParams.get('start');
            }

            if (startParam && startParam.startsWith('ref')) {
                const referrerId = startParam.replace('ref', '').trim();
                const currentUserId = String(tg.initDataUnsafe?.user?.id || '');

                if (referrerId && referrerId !== currentUserId) {
                    balance += 50;
                    updateUI();
                    alert("🎉 You joined via a referral link!\nThe inviter received +50 $DHU");
                    
                    // Notify referrer
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            chat_id: referrerId,
                            text: `🎉 New user joined through your invite!\n+50 $DHU added to your balance!`,
                            parse_mode: 'HTML'
                        })
                    }).catch(() => {});
                }
            }
        }

        function copyReferralLink() {
            const link = getReferralLink();
            document.getElementById('referral-link').textContent = link;
            
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ Referral link copied successfully!");
            }).catch(() => {
                alert("Your referral link:\n" + link);
            });
        }

        function shareReferralLink() {
            const link = getReferralLink();
            if (tg.shareURL) {
                tg.shareURL(link, "Join me on Dawhu Miner and start earning $DHU! 🚀");
            } else {
                alert("Share this link:\n" + link);
            }
        }

        // Keep your mining, task, switchTab, etc. functions...

        // Initialize
        loadUserInfo();
        updateUI();
        updateWalletButton();
        actionBtn.onclick = startMining;
        switchTab(0);

        // Set referral link
        document.getElementById('referral-link').textContent = getReferralLink();

        // Process incoming referral
        processReferral();
    </script>
</body>
</html>
