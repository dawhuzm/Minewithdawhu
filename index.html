<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dawhu Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: white;
            min-height: 100vh;
            padding-bottom: 85px;
            overflow-x: hidden;
        }
        .top-bar {
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            gap: 6px;
            max-width: 100%;
        }
        .player {
            background: linear-gradient(135deg, #6b21a8, #a855f7);
            padding: 5px 10px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }
        .player-img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ddd;
        }
        .balance {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: black;
            padding: 5px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            white-space: nowrap;
            flex-grow: 1;
            max-width: 140px;
        }
        .wallet {
            background: #27272a;
            padding: 5px 10px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            flex-shrink: 0;
        }

        .main {
            text-align: center;
            padding: 15px 20px 10px;
        }
        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 18px;
            color: #e5e7eb;
        }

        .progress-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 15px auto;
        }
        .progress-circle { transform: rotate(-90deg); }
        .progress-bg {
            fill: none;
            stroke: #374151;
            stroke-width: 16;
        }
        .progress-ring {
            fill: none;
            stroke: #22d3ee;
            stroke-width: 16;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.05s linear;
        }
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 170px;
            height: 170px;
            background: radial-gradient(circle, #1e40af, #111827);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            font-weight: bold;
            box-shadow: 0 0 45px #22d3ee;
            border: 8px solid #10b981;
            pointer-events: none;
        }

        .mined {
            font-size: 17px;
            margin: 12px 0 20px;
            color: #9ca3af;
        }

        .action-btn {
            background: linear-gradient(90deg, #15803d, #4ade80);
            color: black;
            font-size: 17px;
            font-weight: bold;
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            width: 88%;
            max-width: 300px;
            margin: 10px auto 25px;
            box-shadow: 0 0 20px #4ade80;
            cursor: pointer;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1a1a1a;
            display: flex;
            padding: 8px 8px 12px;
            gap: 6px;
        }
        .nav-item {
            flex: 1;
            background: #27272a;
            border: 2px solid #4b5563;
            border-radius: 14px;
            padding: 8px 4px 4px;
            text-align: center;
            color: #d1d5db;
            font-size: 10.5px;
            font-weight: 600;
        }
        .nav-item.active {
            background: linear-gradient(135deg, #6b21a8, #a855f7);
            color: white;
            border-color: #eab308;
        }
        .nav-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>
    <!-- Top Bar - Compressed & Stable -->
    <div class="top-bar">
        <div id="player-info" class="player">
            👤 <span id="player-name">Player</span>
        </div>
        <div id="balance" class="balance">50.85 Dhu</div>
        <div class="wallet">🔗 Wallet</div>
    </div>

    <div class="main">
        <div class="title">Mining $Dawhu ⛏️</div>
        
        <div class="progress-container">
            <svg class="progress-circle" width="240" height="240" viewBox="0 0 240 240">
                <circle class="progress-bg" cx="120" cy="120" r="98"/>
                <circle id="progress-ring" class="progress-ring" cx="120" cy="120" r="98"
                    stroke-dasharray="615" stroke-dashoffset="615"/>
            </svg>
            <div class="center-circle">$DHU</div>
        </div>
        
        <div class="mined">Mined: <span id="mined-amount">2.18</span> $DHU</div>
        
        <button id="action-btn" class="action-btn">TAP TO START MINING</button>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab(0)">
            <span class="nav-icon">🏠</span>
            HOME
        </div>
        <div class="nav-item" onclick="switchTab(1)">
            <span class="nav-icon">📋</span>
            TASKS
        </div>
        <div class="nav-item" onclick="switchTab(2)">
            <span class="nav-icon">👥</span>
            INVITE
        </div>
        <div class="nav-item" onclick="switchTab(3)">
            <span class="nav-icon">👤</span>
            PROFILE
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp || {};
        if (tg.expand) tg.expand();
        if (tg.ready) tg.ready();

        function loadUserInfo() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('player-name').textContent = user.first_name || "Player";
                const playerDiv = document.getElementById('player-info');
                if (user.photo_url) {
                    const img = document.createElement('img');
                    img.src = user.photo_url;
                    img.className = 'player-img';
                    playerDiv.insertBefore(img, playerDiv.firstChild);
                }
            }
        }

        let balance = 99.99;
        let mined = 2.18;
        let isMining = false;
        let progressInterval = null;

        const progressRing = document.getElementById('progress-ring');
        const actionBtn = document.getElementById('action-btn');

        function updateUI() {
            document.getElementById('balance').textContent = balance.toFixed(2) + " Dhu";
            document.getElementById('mined-amount').textContent = mined.toFixed(2);
        }

        function startMining() {
            if (isMining) return;
            isMining = true;
            actionBtn.textContent = "MINING...";
            actionBtn.disabled = true;

            let progress = 0;
            const duration = 3000;
            const startTime = Date.now();

            progressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                progress = Math.min((elapsed / duration) * 100, 100);
                const offset = 615 * (1 - progress / 100);
                progressRing.setAttribute('stroke-dashoffset', offset);
                if (progress >= 100) finishMining();
            }, 30);
        }

        function finishMining() {
            clearInterval(progressInterval);
            mined += 1.2 + Math.random() * 0.8;
            balance += 0.45;

            actionBtn.textContent = "CLAIM REWARD";
            actionBtn.disabled = false;
            actionBtn.onclick = claimReward;

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            updateUI();
        }

        function claimReward() {
            if (mined > 0) {
                balance += mined;
                mined = 0;
                alert("✅ Reward Claimed Successfully!");
                actionBtn.textContent = "TAP TO START MINING";
                actionBtn.onclick = startMining;
                progressRing.setAttribute('stroke-dashoffset', 615);
                isMining = false;
                updateUI();
            }
        }

        function switchTab(n) {
            document.querySelectorAll('.nav-item').forEach((item, i) => item.classList.toggle('active', i === n));
            if (n !== 0) alert("This tab is coming soon!");
        }

        actionBtn.onclick = startMining;

        setInterval(() => {
            if (!isMining) {
                mined += 0.02;
                updateUI();
            }
        }, 1400);

        loadUserInfo();
        updateUI();
    </script>
</body>
</html>
